name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run checks
        run: |
          pnpm typecheck
          pnpm test

      - name: Build & Package App
        run: pnpm dist --publish never

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
          if-no-files-found: error

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS installers
        uses: actions/download-artifact@v4
        with:
          name: installers-macos-latest
          path: dist-artifacts

      - name: Download Windows installers
        uses: actions/download-artifact@v4
        with:
          name: installers-windows-latest
          path: dist-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            dist-artifacts/*.exe
            dist-artifacts/*.dmg
            dist-artifacts/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
